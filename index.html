<!DOCTYPE html>
<html lang="fi">
    <head>

        <!-- Meta tiedot -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tietoverkko - Dijkstra Visualisointi</title>

        <!-- Bootsrap CSS -->
        <link href="css/bootstrap.min.css" rel="stylesheet">

        <!-- Oma CSS -->
        <link rel="stylesheet" href="css/tyylit.css">
    </head>
    <body>

        <div class="container-fluid px-4">

            <header class="row">
                <div class="col-12 text-center">
                    <h1 class="main-title">NETWORK // DIJKSTRA ALGORITHM</h1>
                </div>
            </header>

            <main class="row g-4">

                <section class="col-12 col-lg-8">
                    <div id="networkContainer" class="network-viewport rounded">
                        <svg id="svgCanvas" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
                    </div>
                </section>

                <section class="col-12 col-lg-4">
                    <div class="control-panel rounded">
                        <h2 class="panel-subtitle">> KOMENTOPANEELI</h2>
                        <div id="reittilista" class="reitti-lista rounded">
                            <div>Valitse lähde ja kohde.</div>
                        </div>
                        <button id="resetBtn" class="reset-button rounded">Resetoi ja arvo reitti uudelleen</button>
                    </div>
                </section>

            </main>
        </div>

        <!-- Työkalupakki -->
        <div id="toolbox">
            <div class="tool-item" data-action="cut">✂️ Katkaise kaapeli</div>
            <div class="tool-item" data-action="jam">🚦 Lisää ruuhka</div>
            <div class="tool-item" data-action="restore">↩️ Palauta kaapeli</div>
        </div>
        
        <!-- Bootstrap JS -->
        <script src="js/bootstrap.bundle.min.js"></script>

        <!-- Oma js -->
        <script src="js/script.js"></script>
    </body>
</html>
